backend:
  name: git-gateway
  branch: main

# Disable media library — using R2 URLs pasted directly into fields
media_folder: "public/uploads"
public_folder: "/uploads"

# Slug: lowercase, hyphenated
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    folder: "src/content/videos"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{author}} ({{category}})"
    sortable_fields: ["title", "author", "publishDate", "category"]
    view_filters:
      - label: "Featured"
        field: featured
        pattern: true
    fields:
      - label: "Title"
        name: title
        widget: string

      - label: "Author / Studio"
        name: author
        widget: string

      - label: "Author Avatar"
        name: authorAvatar
        widget: image
        required: false
        media_library:
          config:
            multiple: false

      - label: "Category"
        name: category
        widget: select
        options:
          - "3D / CGI"
          - "2D Animation"
          - "Motion Graphics"
          - "Branding & Identity"
          - "Studio / Agency"
          - "UI/UX Motion"

      - label: "Publish Date"
        name: publishDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Featured"
        name: featured
        widget: boolean
        default: false

      - label: "Video File Name"
        name: videoFileName
        widget: string
        hint: "Tên file trên R2 — ví dụ: My Showreel 2025.mp4"

      - label: "Thumbnail URL (R2)"
        name: thumbnail
        widget: string
        hint: "Paste URL từ R2, hoặc để /placeholder.svg nếu chưa có"
        default: "/placeholder.svg"

      - label: "Description"
        name: description
        widget: text

      - label: "Year"
        name: year
        widget: number
        value_type: int
        min: 2000
        max: 2099
        required: false

      - label: "Quality"
        name: quality
        widget: select
        options:
          - { label: "4K", value: "4k" }
          - { label: "1080p", value: "1080p" }
          - { label: "720p", value: "720p" }
          - { label: "Preview", value: "preview" }
        default: "1080p"

      - label: "Source URL"
        name: sourceUrl
        widget: string
        required: false
        hint: "Link gốc của video (Vimeo, website agency...)"

      - label: "Tags"
        name: tags
        widget: list
        default: []
        hint: "Nhập từng tag rồi Enter"

      - label: "Industries"
        name: industries
        widget: select
        multiple: true
        required: false
        default: []
        options:
          - { label: "Tech / SaaS", value: "tech-saas" }
          - { label: "Fashion / Luxury", value: "fashion-luxury" }
          - { label: "Advertising / Commercial", value: "advertising-commercial" }
          - { label: "Entertainment / Media", value: "entertainment-media" }
          - { label: "Finance / Banking", value: "finance-banking" }
          - { label: "Automotive", value: "automotive" }
          - { label: "Sports / Fitness", value: "sports-fitness" }
          - { label: "Food & Beverage", value: "food-beverage" }
          - { label: "Healthcare", value: "healthcare" }
          - { label: "Education", value: "education" }
          - { label: "Real Estate", value: "real-estate" }
          - { label: "Other", value: "other" }

      - label: "Styles"
        name: styles
        widget: select
        multiple: true
        required: false
        default: []
        options:
          - { label: "Minimal / Clean", value: "minimal-clean" }
          - { label: "Bold / Vibrant", value: "bold-vibrant" }
          - { label: "3D / CGI", value: "3d-cgi" }
          - { label: "Hand Drawn", value: "hand-drawn" }
          - { label: "Retro / Vintage", value: "retro-vintage" }
          - { label: "Futuristic / Tech", value: "futuristic-tech" }
          - { label: "Organic / Natural", value: "organic-natural" }
          - { label: "Geometric / Abstract", value: "geometric-abstract" }
          - { label: "Cinematic / Dramatic", value: "cinematic-dramatic" }
          - { label: "Playful / Quirky", value: "playful-quirky" }
          - { label: "Elegant / Sophisticated", value: "elegant-sophisticated" }
          - { label: "Dark / Moody", value: "dark-moody" }

      - label: "Sound / Music"
        name: soundMusic
        widget: select
        multiple: true
        required: false
        default: []
        options:
          - { label: "Electronic / Synth", value: "electronic-synth" }
          - { label: "Epic Cinematic", value: "epic-cinematic" }
          - { label: "Chill / Ambient", value: "chill-ambient" }
          - { label: "Jazz / Acoustic", value: "jazz-acoustic" }
          - { label: "Rock / Energetic", value: "rock-energetic" }
          - { label: "Orchestral / Classical", value: "orchestral-classical" }
          - { label: "Hip-hop / Urban", value: "hip-hop-urban" }
          - { label: "No Sound", value: "no-sound" }
          - { label: "Voiceover Heavy", value: "voiceover-heavy" }
          - { label: "Sound Design Focused", value: "sound-design-focused" }

      - label: "Notes (Markdown)"
        name: body
        widget: markdown
        required: false
        hint: "Optional — ghi chú thêm về video"

  - name: "tools"
    label: "Tools"
    label_singular: "Tool"
    folder: "src/content/tools"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} — {{category}}"
    sortable_fields: ["name", "category", "order"]
    fields:
      - label: "Name"
        name: name
        widget: string

      - label: "Category"
        name: category
        widget: select
        options:
          - "Animation Software"
          - "Web & UI Animation"
          - "AI Motion Tools"
          - "Assets & Resources"

      - label: "Description"
        name: description
        widget: text

      - label: "Pricing"
        name: pricing
        widget: string
        hint: "e.g. Free — from $15 / month"

      - label: "Website URL"
        name: href
        widget: string

      - label: "Thumbnail"
        name: thumbnail
        widget: image
        required: false
        media_library:
          config:
            multiple: false

      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
        fields:
          - label: "Label"
            name: label
            widget: string
          - label: "Color"
            name: color
            widget: select
            default: gray
            options:
              - { label: "Blue", value: "blue" }
              - { label: "Green", value: "green" }
              - { label: "Orange", value: "orange" }
              - { label: "Purple", value: "purple" }
              - { label: "Gray", value: "gray" }

      - label: "Featured"
        name: featured
        widget: boolean
        default: false

      - label: "Order"
        name: order
        widget: number
        default: 0
        hint: "Thứ tự hiển thị trong category (số nhỏ = trên trước)"
